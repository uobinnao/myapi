
name: ci

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Python from .python-version
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Read Python version for Docker
        id: pyver
        run: echo "value=$(tr -d '[:space:]' < .python-version)" >> "$GITHUB_OUTPUT"

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Run tests
        run: uv run pytest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: myapi:ci
          build-args: |
            PYTHON_VERSION=${{ steps.pyver.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: docker run -d --name myapi-ci -p 8000:8000 myapi:ci

      - name: Smoke test liveness
        run: |
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:8000/health/live; then
              exit 0
            fi
            sleep 1
          done
          docker logs myapi-ci
          exit 1

      - name: Show logs on failure
        if: failure()
        run: docker logs myapi-ci || true

      - name: Cleanup
        if: always()
        run: docker rm -f myapi-ci || true
