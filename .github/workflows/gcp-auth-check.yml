name: gcp-auth-check

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  auth-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          version: ">= 416.0.0"

      - name: Verify active identity
        run: |
          echo "ACTIVE_ACCOUNT=$(gcloud auth list --filter=status:ACTIVE --format='value(account)')"
          echo "ACTIVE_PROJECT=$(gcloud config get-value project)"

      - name: Verify Artifact Registry access
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_AR_REPO: ${{ vars.GCP_AR_REPO }}
          GCP_REGION: ${{ vars.GCP_REGION }}
        run: |
          gcloud artifacts repositories describe "$GCP_AR_REPO" \
            --project="$GCP_PROJECT_ID" \
            --location="$GCP_REGION"

