name: image-main

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: image-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-main-image:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    outputs:
      image_name: ${{ steps.meta.outputs.image_name }}
      project_slug: ${{ steps.meta.outputs.project_slug }}
      image_repo: ${{ steps.refs_final.outputs.image_repo }}
      image_ref_tag: ${{ steps.refs_final.outputs.image_ref_tag }}
      image_ref_digest: ${{ steps.refs_final.outputs.image_ref_digest }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_STAGING }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          version: ">= 416.0.0"
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ vars.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Read Python version for Docker
        id: pyver
        run: echo "value=$(tr -d '[:space:]' < .python-version)" >> "$GITHUB_OUTPUT"

      - name: Read app metadata from pyproject.toml
        id: meta
        shell: bash
        run: |
          IMAGE_NAME="$(python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text())
          print(data["project"]["name"].lower())
          PY
          )"

          PROJECT_SLUG="$(
            printf '%s' "$IMAGE_NAME" |
              tr '[:upper:]' '[:lower:]' |
              sed -E 's/[._]+/-/g; s/[^a-z0-9-]+/-/g; s/^-+//; s/-+$//; s/-{2,}/-/g'
          )"

          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "project_slug=$PROJECT_SLUG" >> "$GITHUB_OUTPUT"

      - name: Compute Artifact Registry refs
        id: refs
        run: |
          IMAGE_REPO="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPO }}/${{ steps.meta.outputs.image_name }}"
          IMAGE_REF_TAG="${IMAGE_REPO}:${GITHUB_SHA}"
          IMAGE_REF_DIGEST="${IMAGE_REPO}@${DIGEST}"

          echo "image_repo=$IMAGE_REPO" >> "$GITHUB_OUTPUT"
          echo "image_ref_tag=$IMAGE_REF_TAG" >> "$GITHUB_OUTPUT"
          echo "image_ref_digest=$IMAGE_REF_DIGEST" >> "$GITHUB_OUTPUT"
        env:
          DIGEST: placeholder
          GITHUB_SHA: ${{ github.sha }}
        shell: bash

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push immutable image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPO }}/${{ steps.meta.outputs.image_name }}:${{ github.sha }}
          build-args: |
            PYTHON_VERSION=${{ steps.pyver.outputs.value }}
          labels: |
            org.opencontainers.image.title=${{ steps.meta.outputs.image_name }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Finalize digest refs
        id: refs_final
        run: |
          IMAGE_REPO="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPO }}/${{ steps.meta.outputs.image_name }}"
          IMAGE_REF_TAG="${IMAGE_REPO}:${GITHUB_SHA}"
          IMAGE_REF_DIGEST="${IMAGE_REPO}@${DIGEST}"

          echo "image_repo=$IMAGE_REPO" >> "$GITHUB_OUTPUT"
          echo "image_ref_tag=$IMAGE_REF_TAG" >> "$GITHUB_OUTPUT"
          echo "image_ref_digest=$IMAGE_REF_DIGEST" >> "$GITHUB_OUTPUT"

        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          GITHUB_SHA: ${{ github.sha }}

  deploy-staging:
    needs: build-main-image
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: staging
    env:
      PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Detect migration changes
        id: migration_changes
        shell: bash
        run: |
          set -euo pipefail

          BASE="${{ github.event.before }}"

          if [ -z "${BASE}" ] || [ "${BASE}" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --no-tags --depth=1 origin "${BASE}"

          if git diff --name-only "${BASE}" "${GITHUB_SHA}" | grep -Eq '^(migrations/|alembic.ini|tools/run_migrations\.sh)$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python from .python-version
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_STAGING }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          version: ">= 416.0.0"
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Install Pulumi CLI
        run: curl -fsSL https://get.pulumi.com | sh

      - name: Add Pulumi to PATH
        run: echo "$HOME/.pulumi/bin" >> "$GITHUB_PATH"

      - name: Login to Pulumi GCS backend
        run: pulumi login "gs://${{ vars.GCP_PROJECT_ID }}-pulumi-state"

      - name: Select staging stack
        working-directory: infra/service
        run: pulumi stack select staging --non-interactive

      - name: Feed Pulumi the exact image digest
        working-directory: infra/service
        run: |
          pulumi config set imageByDigest "${IMAGE_BY_DIGEST}" \
            --stack staging \
            --plaintext \
            --non-interactive
        env:
          IMAGE_BY_DIGEST: ${{ needs.build-main-image.outputs.image_ref_digest }}

      - name: Guard Pulumi owns staging Cloud Run service
        working-directory: infra/service
        run: |
          set -euo pipefail

          STACK="staging"
          PROJECT_ID="${{ vars.GCP_PROJECT_ID }}"
          REGION="${{ vars.GCP_REGION }}"
          SERVICE_NAME="${{ needs.build-main-image.outputs.project_slug }}-staging"

          if gcloud run services describe "$SERVICE_NAME" \
            --project "$PROJECT_ID" \
            --region "$REGION" >/dev/null 2>&1; then

            if ! pulumi stack export --stack "$STACK" | grep -q 'gcp:cloudrunv2/service:Service::service'; then
              echo "::error::Cloud Run service $SERVICE_NAME exists, but Pulumi stack $STACK does not own it."
              echo "::error::Run:"
              echo "pulumi import gcp:cloudrunv2/service:Service service projects/$PROJECT_ID/locations/$REGION/services/$SERVICE_NAME"
              exit 1
            fi
          fi
      - name: Feed Pulumi database URL for staging
        working-directory: infra/service
        shell: bash
        run: |
          set -euo pipefail

          DATABASE_URL_VALUE="${DATABASE_URL:-}"
          DATABASE_URL_TRIMMED="$(
            printf '%s' "$DATABASE_URL_VALUE" |
            sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//'
          )"
          DATABASE_URL_NORMALIZED="$(
            printf '%s' "$DATABASE_URL_TRIMMED" |
            tr '[:upper:]' '[:lower:]'
          )"

          if [ -z "$DATABASE_URL_TRIMMED" ] || [ "$DATABASE_URL_NORMALIZED" = "none" ]; then
            echo "No staging DATABASE_URL."

            if pulumi config get databaseUrl --stack staging --non-interactive >/dev/null 2>&1; then
              echo "Removing existing Pulumi databaseUrl config."
              pulumi config rm databaseUrl --stack staging --non-interactive
            else
              echo "No existing Pulumi databaseUrl config to remove."
            fi
          else
            echo "Setting staging databaseUrl Pulumi config."
            pulumi config set databaseUrl "$DATABASE_URL_TRIMMED" --stack staging --secret --non-interactive
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_STAGING_URL }}

      - name: Configure Docker for Artifact Registry
        if: steps.migration_changes.outputs.changed == 'true'
        run: gcloud auth configure-docker "${{ vars.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Run staging migrations
        if: steps.migration_changes.outputs.changed == 'true'
        run: |
          docker pull "${IMAGE_BY_DIGEST}"

          docker run --rm \
            -e APP_ENV=staging \
            -e DATABASE_URL="${DATABASE_URL}" \
            -e DATABASE_MIGRATION_URL="${DATABASE_MIGRATION_URL}" \
            "${IMAGE_BY_DIGEST}" \
            bash -c "./tools/run_migrations.sh"
        env:
          IMAGE_BY_DIGEST: ${{ needs.build-main-image.outputs.image_ref_digest }}
          DATABASE_URL: ${{ secrets.DATABASE_STAGING_URL }}
          DATABASE_MIGRATION_URL: ${{ secrets.DATABASE_MIGRATION_STAGING_URL }}

      - name: Deploy staging
        working-directory: infra/service
        run: pulumi up --stack staging --yes --non-interactive --skip-preview

      - name: Read staging URL
        id: staging
        working-directory: infra/service
        run: echo "url=$(pulumi stack output serviceUrl --stack staging)" >> "$GITHUB_OUTPUT"

      - name: Mint ID token for staging smoke
        id: smoke_auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_STAGING }}
          token_format: id_token
          id_token_audience: ${{ steps.staging.outputs.url }}

      - name: Smoke staging live
        run: |
          curl -fsS \
            -H "Authorization: Bearer ${{ steps.smoke_auth.outputs.id_token }}" \
            "${{ steps.staging.outputs.url }}/health/live"

      - name: Smoke staging ready
        run: |
          curl -fsS \
            -H "Authorization: Bearer ${{ steps.smoke_auth.outputs.id_token }}" \
            "${{ steps.staging.outputs.url }}/health/ready"

  deploy-prod:
    needs: [build-main-image, deploy-staging]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: production
    env:
      PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Detect migration changes
        id: migration_changes
        shell: bash
        run: |
          set -euo pipefail

          BASE="${{ github.event.before }}"

          if [ -z "${BASE}" ] || [ "${BASE}" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --no-tags --depth=1 origin "${BASE}"

          if git diff --name-only "${BASE}" "${GITHUB_SHA}" | grep -Eq '^(migrations/|alembic.ini|tools/run_migrations\.sh)$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python from .python-version
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_PROD }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          version: ">= 416.0.0"
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Install Pulumi CLI
        run: curl -fsSL https://get.pulumi.com | sh

      - name: Add Pulumi to PATH
        run: echo "$HOME/.pulumi/bin" >> "$GITHUB_PATH"

      - name: Login to Pulumi GCS backend
        run: pulumi login "gs://${{ vars.GCP_PROJECT_ID }}-pulumi-state"

      - name: Select prod stack
        working-directory: infra/service
        run: pulumi stack select prod --non-interactive

      - name: Feed Pulumi the exact image digest
        working-directory: infra/service
        run: |
          pulumi config set imageByDigest "${IMAGE_BY_DIGEST}" \
            --stack prod \
            --plaintext \
            --non-interactive
        env:
          IMAGE_BY_DIGEST: ${{ needs.build-main-image.outputs.image_ref_digest }}

      - name: Guard Pulumi owns prod Cloud Run service
        working-directory: infra/service
        run: |
          set -euo pipefail

          STACK="prod"
          PROJECT_ID="${{ vars.GCP_PROJECT_ID }}"
          REGION="${{ vars.GCP_REGION }}"
          SERVICE_NAME="${{ needs.build-main-image.outputs.project_slug }}-prod"

          if gcloud run services describe "$SERVICE_NAME" \
            --project "$PROJECT_ID" \
            --region "$REGION" >/dev/null 2>&1; then

            if ! pulumi stack export --stack "$STACK" | grep -q 'gcp:cloudrunv2/service:Service::service'; then
              echo "::error::Cloud Run service $SERVICE_NAME exists, but Pulumi stack $STACK does not own it."
              echo "::error::Run:"
              echo "pulumi import gcp:cloudrunv2/service:Service service projects/$PROJECT_ID/locations/$REGION/services/$SERVICE_NAME"
              exit 1
            fi
          fi

      - name: Feed Pulumi database URL for prod
        working-directory: infra/service
        shell: bash
        run: |
          set -euo pipefail

          DATABASE_URL_VALUE="${DATABASE_URL:-}"
          DATABASE_URL_TRIMMED="$(
            printf '%s' "$DATABASE_URL_VALUE" |
            sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//'
          )"
          DATABASE_URL_NORMALIZED="$(
            printf '%s' "$DATABASE_URL_TRIMMED" |
            tr '[:upper:]' '[:lower:]'
          )"

          if [ -z "$DATABASE_URL_TRIMMED" ] || [ "$DATABASE_URL_NORMALIZED" = "none" ]; then
            echo "No prod DATABASE_URL."

            if pulumi config get databaseUrl --stack prod --non-interactive >/dev/null 2>&1; then
              echo "Removing existing Pulumi databaseUrl config."
              pulumi config rm databaseUrl --stack prod --non-interactive
            else
              echo "No existing Pulumi databaseUrl config to remove."
            fi
          else
            echo "Setting prod databaseUrl Pulumi config."
            pulumi config set databaseUrl "$DATABASE_URL_TRIMMED" --stack prod --secret --non-interactive
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_PROD_URL }}

      - name: Configure Docker for Artifact Registry
        if: steps.migration_changes.outputs.changed == 'true'
        run: gcloud auth configure-docker "${{ vars.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Run prod migrations
        if: steps.migration_changes.outputs.changed == 'true'
        run: |
          docker pull "${IMAGE_BY_DIGEST}"

          docker run --rm \
            -e APP_ENV=prod \
            -e DATABASE_URL="${DATABASE_URL}" \
            -e DATABASE_MIGRATION_URL="${DATABASE_MIGRATION_URL}" \
            "${IMAGE_BY_DIGEST}" \
            bash -c "./tools/run_migrations.sh"
        env:
          IMAGE_BY_DIGEST: ${{ needs.build-main-image.outputs.image_ref_digest }}
          DATABASE_URL: ${{ secrets.DATABASE_PROD_URL }}
          DATABASE_MIGRATION_URL: ${{ secrets.DATABASE_MIGRATION_PROD_URL }}

      - name: Deploy prod
        working-directory: infra/service
        run: pulumi up --stack prod --yes --non-interactive --skip-preview

      - name: Read prod URL
        id: prod
        working-directory: infra/service
        run: echo "url=$(pulumi stack output serviceUrl --stack prod)" >> "$GITHUB_OUTPUT"

      - name: Mint ID token for prod smoke
        id: prod_smoke_auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_PROD }}
          token_format: id_token
          id_token_audience: ${{ steps.prod.outputs.url }}

      - name: Smoke prod live
        run: |
          curl -fsS \
            -H "Authorization: Bearer ${{ steps.prod_smoke_auth.outputs.id_token }}" \
            "${{ steps.prod.outputs.url }}/health/live"

      - name: Smoke prod ready
        run: |
          curl -fsS \
            -H "Authorization: Bearer ${{ steps.prod_smoke_auth.outputs.id_token }}" \
            "${{ steps.prod.outputs.url }}/health/ready"
