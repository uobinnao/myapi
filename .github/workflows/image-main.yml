name: image-main

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: image-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-main-image:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Read Python version for Docker
        id: pyver
        run: echo "value=$(tr -d '[:space:]' < .python-version)" >> "$GITHUB_OUTPUT"

      - name: Read image name from pyproject.toml
        id: meta
        run: |
          IMAGE_NAME="$(python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text())
          print(data["project"]["name"].lower())
          PY
          )"
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build immutable image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.meta.outputs.image_name }}:${{ github.sha }}
          build-args: |
            PYTHON_VERSION=${{ steps.pyver.outputs.value }}
          labels: |
            org.opencontainers.image.title=${{ steps.meta.outputs.image_name }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke liveness
        run: |
          docker run -d --name myapi-main -p 8000:8000 $IMAGE_NAME:$GITHUB_SHA
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/health/live; then
              exit 0
            fi
            sleep 1
          done
          docker logs myapi-main
          exit 1
        env:
          IMAGE_NAME: ${{ steps.meta.outputs.image_name }}
          GITHUB_SHA: ${{ github.sha }}

      - name: Save image tarball
        run: docker save $IMAGE_NAME:$GITHUB_SHA -o /tmp/${IMAGE_NAME}-${GITHUB_SHA}.tar
        env:
          IMAGE_NAME: ${{ steps.meta.outputs.image_name }}
          GITHUB_SHA: ${{ github.sha }}

      - name: Upload built image artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.meta.outputs.image_name }}-${{ github.sha }}
          path: /tmp/${{ steps.meta.outputs.image_name }}-${{ github.sha }}.tar
          retention-days: 7

      - name: Cleanup
        if: always()
        run: docker rm -f myapi-main || true
