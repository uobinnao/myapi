name: preview-cleanup

on:
  pull_request:
    branches: [main]
    types: [closed, unlabeled]

permissions:
  contents: read
  id-token: write

concurrency:
  group: preview-cleanup-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cleanup-preview:
    if: >
      github.event.action == 'closed' ||
      (github.event.action == 'unlabeled' && github.event.label.name == 'preview')
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
      STACK_NAME: preview-pr-${{ github.event.pull_request.number }}
      PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Python from .python-version
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Read app metadata from pyproject.toml
        id: meta
        shell: bash
        run: |
          IMAGE_NAME="$(python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text())
          print(data["project"]["name"].lower())
          PY
          )"

          PROJECT_SLUG="$(
            printf '%s' "$IMAGE_NAME" |
              tr '[:upper:]' '[:lower:]' |
              sed -E 's/[._]+/-/g; s/[^a-z0-9-]+/-/g; s/^-+//; s/-+$//; s/-{2,}/-/g'
          )"

          SERVICE_NAME="${PROJECT_SLUG}-pr-${{ github.event.pull_request.number }}"

          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "project_slug=$PROJECT_SLUG" >> "$GITHUB_OUTPUT"
          echo "service_name=$SERVICE_NAME" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_PREVIEW }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          version: ">= 416.0.0"
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Install Pulumi CLI
        run: curl -fsSL https://get.pulumi.com | sh

      - name: Add Pulumi to PATH
        run: echo "$HOME/.pulumi/bin" >> "$GITHUB_PATH"

      - name: Login to Pulumi GCS backend
        run: pulumi login "gs://${PROJECT_ID}-pulumi-state"

      - name: Destroy Pulumi preview stack if it exists
        working-directory: infra/service
        shell: bash
        run: |
          set -euo pipefail

          if pulumi stack select "${STACK_NAME}" --non-interactive >/dev/null 2>&1; then
            pulumi destroy --stack "${STACK_NAME}" --yes --non-interactive
            pulumi stack rm "${STACK_NAME}" --yes --non-interactive
          else
            echo "Pulumi stack ${STACK_NAME} does not exist; nothing to destroy."
          fi

      - name: Delete orphan Cloud Run preview service if it exists
        shell: bash
        run: |
          set -euo pipefail

          if gcloud run services describe "$SERVICE_NAME" \
            --region "$REGION" \
            --project "$PROJECT_ID" >/dev/null 2>&1; then

            echo "Deleting orphan Cloud Run service: $SERVICE_NAME"

            gcloud run services delete "$SERVICE_NAME" \
              --region "$REGION" \
              --project "$PROJECT_ID" \
              --quiet
          else
            echo "Service $SERVICE_NAME does not exist; nothing to delete."
          fi
        env:
          SERVICE_NAME: ${{ steps.meta.outputs.service_name }}
