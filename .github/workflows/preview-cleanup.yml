name: preview-cleanup

on:
  pull_request:
    branches: [main]
    types: [closed, unlabeled]

permissions:
  contents: read
  id-token: write

concurrency:
  group: preview-cleanup-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cleanup-preview:
    if: >
      github.event.action == 'closed' ||
      (github.event.action == 'unlabeled' && github.event.label.name == 'preview')
    runs-on: ubuntu-latest

    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Read app metadata from pyproject.toml
        id: meta
        shell: bash
        run: |
          IMAGE_NAME="$(python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text())
          print(data["project"]["name"].lower())
          PY
          )"

          PROJECT_SLUG="$(
            printf '%s' "$IMAGE_NAME" |
              tr '[:upper:]' '[:lower:]' |
              sed -E 's/[._]+/-/g; s/[^a-z0-9-]+/-/g; s/^-+//; s/-+$//; s/-{2,}/-/g'
          )"

          SERVICE_NAME="${PROJECT_SLUG}-pr-${{ github.event.pull_request.number }}"

          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "project_slug=$PROJECT_SLUG" >> "$GITHUB_OUTPUT"
          echo "service_name=$SERVICE_NAME" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_STAGING }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          version: ">= 416.0.0"
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Delete preview service if it exists
        shell: bash
        run: |
          if gcloud run services describe "$SERVICE_NAME" \
            --region "$REGION" \
            --project "$PROJECT_ID" >/dev/null 2>&1; then
            gcloud run services delete "$SERVICE_NAME" \
              --region "$REGION" \
              --project "$PROJECT_ID" \
              --quiet
          else
            echo "Service $SERVICE_NAME does not exist; nothing to delete."
          fi
        env:
          SERVICE_NAME: ${{ steps.meta.outputs.service_name }}
