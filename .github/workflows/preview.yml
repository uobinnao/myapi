name: preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled, ready_for_review]

permissions:
  contents: read
  id-token: write

concurrency:
  group: preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: >
      github.event.pull_request.draft == false &&
      contains(github.event.pull_request.labels.*.name, 'preview')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    environment:
      name: preview/pr-${{ github.event.pull_request.number }}
      url: ${{ steps.preview_url.outputs.url }}

    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
      AR_REPO: ${{ vars.GCP_AR_REPO }}
      STACK_NAME: preview-pr-${{ github.event.pull_request.number }}
      SERVICE_NAME: myapi-pr-${{ github.event.pull_request.number }}
      PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Python from .python-version
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_PREVIEW }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          version: ">= 416.0.0"
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ vars.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Read Python version for Docker
        id: pyver
        run: echo "value=$(tr -d '[:space:]' < .python-version)" >> "$GITHUB_OUTPUT"

      - name: Read app metadata
        id: meta
        shell: bash
        run: |
          IMAGE_NAME="$(python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text())
          print(data["project"]["name"].lower())
          PY
          )"

          PROJECT_SLUG="$(
            printf '%s' "$IMAGE_NAME" |
              tr '[:upper:]' '[:lower:]' |
              sed -E 's/[._]+/-/g; s/[^a-z0-9-]+/-/g; s/^-+//; s/-+$//; s/-{2,}/-/g'
          )"

          IMAGE_REPO="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPO }}/${IMAGE_NAME}"
          IMAGE_REF_TAG="${IMAGE_REPO}:pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}"
          RUNTIME_SA_EMAIL="${PROJECT_SLUG}-preview-runtime@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com"

          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "project_slug=$PROJECT_SLUG" >> "$GITHUB_OUTPUT"
          echo "image_repo=$IMAGE_REPO" >> "$GITHUB_OUTPUT"
          echo "image_ref_tag=$IMAGE_REF_TAG" >> "$GITHUB_OUTPUT"
          echo "runtime_sa_email=$RUNTIME_SA_EMAIL" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push preview image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image_ref_tag }}
          build-args: |
            PYTHON_VERSION=${{ steps.pyver.outputs.value }}
          labels: |
            org.opencontainers.image.title=${{ steps.meta.outputs.image_name }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.pull_request.head.sha }}
            org.opencontainers.image.ref.name=pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Compute immutable image ref
        id: refs
        shell: bash
        run: |
          IMAGE_REF_DIGEST="${{ steps.meta.outputs.image_repo }}@${{ steps.build.outputs.digest }}"
          echo "image_ref_digest=$IMAGE_REF_DIGEST" >> "$GITHUB_OUTPUT"

      - name: Smoke preview container locally
        run: |
          docker run -d --name myapi-preview \
          -e PORT=8080 \
          -e APP_ENV=preview \
          -e USDA_API_KEY=dummy \
          -p 8080:8080 \
          "${IMAGE_REF_TAG}"

          for i in {1..30}; do
            if curl -fsS http://localhost:8080/health/live; then
              exit 0
            fi
            sleep 1
          done

          docker logs myapi-preview
          exit 1
        env:
          IMAGE_REF_TAG: ${{ steps.meta.outputs.image_ref_tag }}

      - name: Cleanup preview container
        if: always()
        run: docker rm -f myapi-preview || true

      - name: Install Pulumi CLI
        run: curl -fsSL https://get.pulumi.com | sh

      - name: Add Pulumi to PATH
        run: echo "$HOME/.pulumi/bin" >> "$GITHUB_PATH"

      - name: Login to Pulumi GCS backend
        run: pulumi login "gs://${{ vars.GCP_PROJECT_ID }}-pulumi-state"

      - name: Select preview stack
        working-directory: infra/service
        run: pulumi stack select "${STACK_NAME}" --create --non-interactive

      - name: Configure preview stack
        working-directory: infra/service
        env:
          IMAGE_BY_DIGEST: ${{ steps.refs.outputs.image_ref_digest }}
          RUNTIME_SA_EMAIL: ${{ steps.meta.outputs.runtime_sa_email }}
        run: |
          pulumi config set gcp:project "${PROJECT_ID}" --stack "${STACK_NAME}" --non-interactive
          pulumi config set gcp:region "${REGION}" --stack "${STACK_NAME}" --non-interactive

          pulumi config set imageByDigest "${IMAGE_BY_DIGEST}" \
            --stack "${STACK_NAME}" \
            --plaintext \
            --non-interactive

          pulumi config set runtimeServiceAccountEmail "${RUNTIME_SA_EMAIL}" \
            --stack "${STACK_NAME}" \
            --plaintext \
            --non-interactive

          pulumi config set serviceName "${SERVICE_NAME}" \
            --stack "${STACK_NAME}" \
            --plaintext \
            --non-interactive

          pulumi config set usdaSecretName "USDA_API_KEY_PREVIEW" \
            --stack "${STACK_NAME}" \
            --plaintext \
            --non-interactive

          pulumi config set usdaSecretVersion "latest" \
            --stack "${STACK_NAME}" \
            --plaintext \
            --non-interactive

          pulumi config set publicAccess true \
            --stack "${STACK_NAME}" \
            --non-interactive

          pulumi config set minInstanceCount 0 --stack "${STACK_NAME}" --non-interactive
          pulumi config set maxInstanceCount 1 --stack "${STACK_NAME}" --non-interactive
          pulumi config set timeout 60s --stack "${STACK_NAME}" --non-interactive
          pulumi config set cpuIdle true --stack "${STACK_NAME}" --non-interactive
          pulumi config set startupCpuBoost false --stack "${STACK_NAME}" --non-interactive

      - name: Preview preview-stack deploy
        working-directory: infra/service
        run: pulumi preview --stack "${STACK_NAME}" --non-interactive

      - name: Deploy preview stack
        working-directory: infra/service
        run: pulumi up --stack "${STACK_NAME}" --yes --non-interactive

      - name: Dump Cloud Run logs on failure
        if: failure()
        shell: bash
        run: |
          gcloud logging read \
            "resource.type=\"cloud_run_revision\" AND resource.labels.service_name=\"${SERVICE_NAME}\"" \
            --project "${PROJECT_ID}" \
            --freshness=30m \
            --limit=200 \
            --format="json"

      - name: Read preview URL
        id: preview_url
        working-directory: infra/service
        run: echo "url=$(pulumi stack output serviceUrl --stack "${STACK_NAME}")" >> "$GITHUB_OUTPUT"
